# =============================================================================
# Polyagent DevContainer — Docker Compose (datascience variant)
# =============================================================================
# 모든 설정은 .env 파일에서 관리합니다.
#
# 사용:
#   docker compose up -d
#
# 다중 인스턴스:
#   cp .env .env.project-b
#   docker compose --env-file .env.project-b up -d
# =============================================================================

services:
  polyagent-devcontainer-ds:
    container_name: ${CONTAINER_NAME:-polyagent-ds-dev}
    image: ${IMAGE_NAME:-polyagent-devcontainer-ds}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PROJECT_NODE_VERSION=${PROJECT_NODE_VERSION:-}
        - CONDA_PYTHON_VERSION=${CONDA_PYTHON_VERSION:-3.12}

    volumes:
      - ${HOST_WORKSPACE_PATH:-..}:/workspaces:cached
      - /var/run/docker.sock:/var/run/docker.sock

    # =========================================================================
    # Ports — HOST:CONTAINER 분리 매핑
    # HOST 포트: .env PORT_* (대역별 변동, 충돌 방지)
    # CONTAINER 포트: 표준 고정 (서비스가 리스닝하는 포트)
    # 사용하지 않는 포트는 주석 처리하세요.
    # =========================================================================
    ports:
      - "${PORT_APP:-32000}:3000"
      - "${PORT_API:-32080}:8080"
      - "${PORT_DB:-32432}:5432"
      - "${PORT_EXTRA:-32888}:8888"

    # =========================================================================
    # DNS — Docker Desktop 내부 DNS에 의존하지 않음
    # Windows/WSL2에서 Docker Desktop DNS(192.168.65.x) 해석 실패 방지
    # =========================================================================
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1

    environment:
      - TZ=${TZ:-UTC}

    stdin_open: true
    tty: true

    healthcheck:
      test: ["CMD-SHELL", "claude --version && conda run -n ds python --version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

    # command는 Dockerfile CMD ["sleep", "infinity"]가 담당
    # ENTRYPOINT가 항상 setup-env.sh를 실행한 후 CMD를 exec함
