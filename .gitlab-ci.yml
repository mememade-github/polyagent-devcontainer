# =============================================================================
# .gitlab-ci.yml — GitHub → GitLab pull-mirror via scheduled CI pipeline
# =============================================================================
# GitLab CE's built-in Pull Mirror is a Premium feature, so this scheduled
# pipeline replaces it for self-hosted CE/Free instances.
#
# Activation (consumer side):
#   1. Register a GitLab Runner that has network access to github.com.
#      (gitlab-runner register --url <your-gitlab-url> ...)
#   2. GitLab UI → Project → CI/CD → Schedules → New schedule
#        Description: "Mirror from GitHub"
#        Interval:    */30 * * * *   (or whatever cadence you want)
#        Target branch: main
#   3. CI/CD → Variables → add GITLAB_PUSH_TOKEN
#        Project Access Token, scope = write_repository.
# =============================================================================

stages:
  - sync

variables:
  GITHUB_REPO_URL: "https://github.com/mememade-github/polyagent-devcontainer.git"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"

mirror-from-github:
  stage: sync
  image: alpine:3.20
  before_script:
    - apk add --no-cache git ca-certificates
    - git config --global user.email "ci@example.invalid"
    - git config --global user.name "GitLab CI Mirror"
  script:
    - git remote add upstream "$GITHUB_REPO_URL"
    - git fetch upstream main
    - git checkout main
    - git reset --hard upstream/main
    - |
      git push -o ci.skip \
        "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.git" \
        main --force
  rules:
    # Run only on schedule, never on regular push (avoid mirror→push→mirror loop)
    - if: $CI_PIPELINE_SOURCE == "schedule"
