# =============================================================================
# .gitlab-ci.yml — GitHub → GitLab Pull Mirror (CI scheduled pipeline)
# =============================================================================
# GitLab CE의 Pull Mirror는 Premium 전용이므로 CI scheduled pipeline으로 대체.
# 본 파일은 사내 GitLab Runner가 등록된 후 자동 작동합니다.
#
# 등록 절차:
#   1. <gitlab-server> (<gitlab-host>) 또는 별도 사내 노드에 GitLab Runner 등록
#      (참고: gitlab-runner register --url https://<gitlab-host>:<port> ...)
#   2. GitLab UI → 본 프로젝트 → CI/CD → Schedules → New schedule
#      - Description: "Mirror from GitHub"
#      - Interval: */30 * * * *  (또는 원하는 주기)
#      - Target branch: main
#   3. CI/CD → Variables 에 GITLAB_PUSH_TOKEN 등록 (Project Access Token, scope=write_repository)
#
# Runner 등록 전까지는 /workspaces/scripts/git/push-mirror-polyagent.sh 가
# 동일 작업을 수행합니다 (ROOT 워크스페이스에서 명시적 호출).
# =============================================================================

stages:
  - sync

variables:
  GITHUB_REPO_URL: "https://github.com/mememade-github/polyagent-devcontainer.git"
  GIT_STRATEGY: clone
  GIT_DEPTH: "0"

mirror-from-github:
  stage: sync
  image: alpine:3.20
  before_script:
    - apk add --no-cache git ca-certificates
    - git config --global user.email "ci@gitlab.local"
    - git config --global user.name "GitLab CI Mirror"
  script:
    - git remote add upstream "$GITHUB_REPO_URL"
    - git fetch upstream main
    - git checkout main
    - git reset --hard upstream/main
    - |
      git push -o ci.skip \
        "https://oauth2:${GITLAB_PUSH_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/${CI_PROJECT_PATH}.git" \
        main --force
  rules:
    # Run only on schedule, never on regular push (avoid mirror→push→mirror loop)
    - if: $CI_PIPELINE_SOURCE == "schedule"
